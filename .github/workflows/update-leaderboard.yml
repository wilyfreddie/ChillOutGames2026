name: Update Leaderboard Data

on:
  schedule:
    - cron: "0 10 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build data.json from Google Sheets CSV
        env:
          ROSTER_CSV_URL: ${{ secrets.ROSTER_CSV_URL }}
          SWAPS_CSV_URL: ${{ secrets.SWAPS_CSV_URL }}
          WOD_INFO_CSV_URL: ${{ secrets.WOD_INFO_CSV_URL }}
          WOD_1_CSV_URL: ${{ secrets.WOD_1_CSV_URL }}
          WOD_2_CSV_URL: ${{ secrets.WOD_2_CSV_URL }}
          WOD_3_CSV_URL: ${{ secrets.WOD_3_CSV_URL }}
          WOD_4_CSV_URL: ${{ secrets.WOD_4_CSV_URL }}
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import os
          import urllib.parse
          import urllib.request
          from collections import defaultdict

          DEFAULT_URLS = {
              "Roster": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=1802066284&single=true&output=csv",
              "Swaps": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=922568610&single=true&output=csv",
              "WOD_Info": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=1184394579&single=true&output=csv",
              "WOD_1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=362711100&single=true&output=csv",
              "WOD_2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=1772215034&single=true&output=csv",
              "WOD_3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pub?gid=720613385&single=true&output=csv",
              "WOD_4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8SD3nbpkT_ECrdyqXVI31C1mMHb2MM_nd_L09fmV9Z49kAO_OaKFOSjEY1srqIkQ7bjuRYqgOLvz0/pubhtml?gid=93392467&single=true",
          }

          URL_ENV = {
              "Roster": "ROSTER_CSV_URL",
              "Swaps": "SWAPS_CSV_URL",
              "WOD_Info": "WOD_INFO_CSV_URL",
              "WOD_1": "WOD_1_CSV_URL",
              "WOD_2": "WOD_2_CSV_URL",
              "WOD_3": "WOD_3_CSV_URL",
              "WOD_4": "WOD_4_CSV_URL",
          }

          OPTIONAL_SHEETS = {"Swaps", "WOD_3", "WOD_4"}

          def normalize_csv_url(url):
              if not url:
                  return ""
              parsed = urllib.parse.urlparse(url)
              if "output=csv" in parsed.query:
                  return url
              if "/pubhtml" in parsed.path and "gid=" in parsed.query:
                  base = url.split("/pubhtml", 1)[0] + "/pub"
                  gid = urllib.parse.parse_qs(parsed.query).get("gid", [""])[0]
                  if gid:
                      return f"{base}?gid={gid}&single=true&output=csv"
              return url

          def fetch_csv(url):
              with urllib.request.urlopen(url) as response:
                  text = response.read().decode("utf-8-sig")
              return list(csv.DictReader(io.StringIO(text)))

          tables = {}
          for sheet_name, env_name in URL_ENV.items():
              url = os.getenv(env_name, "").strip() or DEFAULT_URLS[sheet_name]
              url = normalize_csv_url(url)
              if not url:
                  tables[sheet_name] = []
                  continue
              try:
                  tables[sheet_name] = fetch_csv(url)
              except Exception as error:
                  if sheet_name in OPTIONAL_SHEETS:
                      print(f"Warning: could not fetch {sheet_name} ({error}); continuing with empty table")
                      tables[sheet_name] = []
                  else:
                      raise

          def parse_int(value):
              if value is None:
                  return None
              text = str(value).strip()
              if not text:
                  return None
              return int(float(text))

          teams = {}
          roster_by_team = defaultdict(list)
          captains = {}

          for row in tables["Roster"]:
              team_id = row["team_id"].strip()
              athlete = row["athlete_name"].strip()
              teams.setdefault(team_id, {
                  "id": team_id,
                  "name": row["team_name"].strip(),
                  "division": row["division"].strip(),
                  "captain": "",
                  "roster": {},
                  "swaps": [],
                  "scores": [],
                  "total_points": 0,
                  "overall_rank": None,
              })
              roster_by_team[team_id].append(athlete)
              if row["captain"].strip().upper() == "TRUE":
                  teams[team_id]["captain"] = athlete
                  captains[team_id] = athlete

          swaps_by_team = defaultdict(list)
          for row in tables["Swaps"]:
              if not row.get("team_id"):
                  continue
              team_id = row["team_id"].strip()
              wod = int(row["wod"])
              swapped_out = row["swapped_out"].strip()
              if swapped_out == captains.get(team_id):
                  raise ValueError(f"Captain cannot be swapped out: {team_id} {swapped_out}")
              swap = {
                  "wod": wod,
                  "swapped_out": swapped_out,
                  "swapped_in": row["swapped_in"].strip(),
                  "swapped_in_from_team": "External Roster",
              }
              swaps_by_team[team_id].append(swap)
              teams[team_id]["swaps"].append(swap)

          for team_id, team in teams.items():
              current = list(roster_by_team[team_id])
              for wod in range(1, 5):
                  for swap in sorted(swaps_by_team[team_id], key=lambda item: item["wod"]):
                      if swap["wod"] == wod:
                          current = [athlete for athlete in current if athlete != swap["swapped_out"]]
                          if swap["swapped_in"] not in current:
                              current.append(swap["swapped_in"])
                  if team["captain"] not in current:
                      raise ValueError(f"Captain missing from roster: {team_id}")
                  team["roster"][f"wod{wod}"] = list(current)

          wods = []
          released_wods = []
          for row in tables["WOD_Info"]:
              wod_id = parse_int(row.get("wod_id"))
              if wod_id is None:
                  continue
              released = row["released"].strip().upper() == "TRUE"
              if released:
                  released_wods.append(wod_id)
              wods.append({
                  "id": wod_id,
                  "name": row["name"].strip(),
                  "release_date": row["release_date"].strip(),
                  "released": released,
                  "format": row["format"].strip(),
                  "description": row["description"].strip(),
                  "time_cap": row.get("time_cap", "").strip(),
              })

          if wods:
              wod_ids = sorted({wod["id"] for wod in wods})
          else:
              wod_ids = [1, 2, 3, 4]

          for wod in wod_ids:
              rows = {row["team_id"].strip(): row for row in tables.get(f"WOD_{wod}", []) if row.get("team_id")}
              for team_id, team in teams.items():
                  row = rows.get(team_id, {})
                  score = row.get("score", "").strip() or None
                  rank = parse_int(row.get("rank"))
                  points = parse_int(row.get("points"))
                  team["scores"].append({"wod": wod, "score": score, "rank": rank, "points": points})

          divisions = sorted({team["division"] for team in teams.values()})
          for team in teams.values():
              team["total_points"] = sum(
                  score["points"] for score in team["scores"]
                  if score["wod"] in released_wods and score["points"] is not None
              )

          recent_wod = max(released_wods) if released_wods else 0
          for division in divisions:
              division_teams = [team for team in teams.values() if team["division"] == division]
              division_teams.sort(key=lambda team: (
                  team["total_points"],
                  next((score["rank"] for score in team["scores"] if score["wod"] == recent_wod), 999),
                  team["name"],
              ))
              for index, team in enumerate(division_teams, start=1):
                  team["overall_rank"] = index

          output = {
              "competition": "Chill Out Games 2026",
              "next_wod_release": next((f"{wod['release_date']}T00:00:00" for wod in wods if not wod["released"]), ""),
              "divisions": divisions,
              "wods": sorted(wods, key=lambda wod: wod["id"]),
              "teams": sorted(teams.values(), key=lambda team: team["id"]),
          }

          with open("data.json", "w", encoding="utf-8") as file:
              json.dump(output, file, indent=2)
              file.write("\n")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update leaderboard data [skip ci]"
          git push
